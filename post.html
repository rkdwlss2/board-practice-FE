<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 상세</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>
    <div class="post-detail-container">
        <!-- 게시글 내용 -->
        <header class="post-detail-header" id ="post-detail-header">
            <h2 class="post-detail-title">게시글 제목이 여기에 표시됩니다.</h2>
            <div class="author-info">
                <img src="./image/dog.jpg" alt="작성자 프로필">
                <div class="author-meta">
                    <span class="author-name">작성자 닉네임</span>
                    <span class="post-timestamp">2023-10-28 10:00:00</span>
                </div>
            </div>
            <div class="post-actions">
                <button class="btn-edit">수정</button>
                <button class="btn-delete">삭제</button>
            </div>
        </header>

        <main class="post-detail-content" id = "post-detail-content">
            <p>게시글의 전체 내용이 여기에 들어갑니다. 여러 줄의 텍스트가 포함될 수 있습니다.</p>
            <p>이미지가 있다면 여기에 표시됩니다.</p>
            <img src="./image/dog.jpg" alt="게시글 이미지" style="max-width: 100%; margin-top: 20px;">
        </main>

        <footer class="post-detail-footer" id = "post-detail-footer">
            <div class="post-stats">
                <span><i class="fa-regular fa-heart"></i> 15</span>
                <span><i class="fa-regular fa-comment"></i> 8</span>
                <span>조회수 102</span>
            </div>
        </footer>

        <!-- 댓글 섹션 -->
        <section class="comments-container">
            <h3>댓글</h3>
            <!-- 댓글 작성 폼 -->
            <form id="comment-form" class="comment-form">
                <textarea placeholder="댓글을 입력하세요..." required></textarea>
                <button type="submit" class="btn-comment-submit">등록</button>
            </form>

            <!-- 댓글 목록 -->
            <div class="comment-list" id="comment-list">
                <!-- 예시 댓글 1 -->
                <div class="comment-item">
                    <div class="comment-author">
                        <img src="./image/dog.jpg" alt="댓글 작성자 프로필">
                        <span>댓글러1</span>
                    </div>
                    <div class="comment-content">
                        <p>정말 유용한 정보네요!</p>
                        <span class="comment-timestamp">2023-10-28 10:05:10</span>
                    </div>
                    <div class="comment-actions">
                        <button class="btn-edit-comment">수정</button>
                        <button class="btn-delete-comment">삭제</button>
                    </div>
                </div>
                <!-- 예시 댓글 2 -->
                <div class="comment-item">
                    <div class="comment-author">
                        <img src="./image/dog.jpg" alt="댓글 작성자 프로필">
                        <span>원글작성자</span>
                    </div>
                    <div class="comment-content">
                        <p>감사합니다. 도움이 되셨다니 다행입니다.</p>
                        <span class="comment-timestamp">2023-10-28 10:15:20</span>
                    </div>
                    <div class="comment-actions">
                        <button class="btn-edit-comment">수정</button>
                        <button class="btn-delete-comment">삭제</button>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <script src="post.js"></script>
</body>
</html>
