<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원정보 수정</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>
    <div class="signup-container">
        <h2>회원정보 수정</h2>
        <form id="profile-edit-form">
            <div class="input-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" readonly style="background-color: #f1f3f5; cursor: not-allowed;">
            </div>
            <div class="input-group">
                <label for="nickname">닉네임</label>
                <input type="text" id="nickname" name="nickname" required placeholder="새 닉네임을 입력하세요">
            </div>
            <div class="button-group">
                <button type="submit" class="btn-login">수정완료</button>
                <button type="button" class="btn-signup" id="withdraw-btn" style="color: #dc3545; background-color: #fff; border: 1px solid #dc3545;">회원탈퇴</button>
            </div>
        </form>
    </div>
    <script src="profile.js"></script>
</body>
</html>
