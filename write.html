<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 작성</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="write-container">
        <h2>게시글 작성</h2>
        <form id="write-form">
            <div class="input-group">
                <label for="post-title">제목</label>
                <input type="text" id="post-title" name="post-title" required placeholder="제목을 입력하세요">
            </div>
            <div class="input-group">
                <label for="post-content">내용</label>
                <textarea id="post-content" name="post-content" rows="10" required placeholder="내용을 입력하세요"></textarea>
            </div>
            <div class="input-group">
                <label for="post-image">이미지 첨부</label>
                <input type="file" id="post-image" name="post-image" accept="image/*">
            </div>
            <div class="button-group">
                <button type="submit" class="btn-login" id="submit-post-btn">완료</button>
                <button type="button" class="btn-signup" onclick="location.href='board.html'">취소</button>
            </div>
        </form>
    </div>
    <script src="write.js"></script>
</body>
</html>
