<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 수정</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="signup-container">
        <h2>비밀번호 수정</h2>
        <form id="password-edit-form">
            <div class="input-group">
                <label for="password">새 비밀번호</label>
                <input type="password" id="password" name="password" required placeholder="새 비밀번호를 입력하세요">
            </div>
            <div class="input-group">
                <label for="password-confirm">비밀번호 확인</label>
                <input type="password" id="password-confirm" name="password-confirm" required placeholder="비밀번호를 다시 입력하세요">
            </div>
            <div class="button-group">
                <button type="submit" class="btn-login">수정하기</button>
                <button type="button" class="btn-signup" onclick="history.back()">취소</button>
            </div>
        </form>
    </div>
    <script src="profile.js"></script>
</body>
</html>
